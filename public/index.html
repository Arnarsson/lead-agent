<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Agent — Seven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0B; --surface: #1A1A1B; --surface-alt: #1F1F23; --surface-hover: #252526;
      --border: #2A2A2B; --border-light: #3A3A3B;
      --text: #E8DCC8; --text-muted: rgba(232,220,200,0.45); --text-sec: rgba(232,220,200,0.7);
      --accent: #FF6B35; --accent-hover: #FF7D4D; --accent-muted: rgba(255,107,53,0.15);
      --success: #10B981; --success-muted: rgba(16,185,129,0.15);
      --warning: #F59E0B; --warning-muted: rgba(245,158,11,0.15);
      --error: #EF4444; --error-muted: rgba(239,68,68,0.15);
      --purple: #A78BFA;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }
    .serif { font-family: 'Instrument Serif', serif; }
    .mono  { font-family: 'JetBrains Mono', monospace; }
    .app { max-width: 1400px; margin: 0 auto; padding: 2rem; }

    /* Header */
    .header h1 {
      font-family: 'Instrument Serif', serif; font-size: clamp(2rem, 5vw, 3.5rem);
      background: linear-gradient(135deg, var(--accent), #FF9A6B, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.15em; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 1.25rem 0; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .last-run { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted); }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat-value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; line-height: 1; margin-bottom: 0.25rem; }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .stat-card.accent { border-color: var(--accent); background: var(--accent-muted); }
    .stat-card.accent .stat-value { color: var(--accent); }
    .stat-card.success { border-color: var(--success); background: var(--success-muted); }
    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.warning { border-color: var(--warning); background: var(--warning-muted); }
    .stat-card.warning .stat-value { color: var(--warning); }
    .stat-card.hot { border-color: var(--error); background: var(--error-muted); }
    .stat-card.hot .stat-value { color: var(--error); }
    .stat-card.purple { border-color: var(--purple); background: rgba(167,139,250,0.1); }
    .stat-card.purple .stat-value { color: var(--purple); }

    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; flex-wrap: wrap; }
    .tab-btn { padding: 0.5rem 1.25rem; background: none; border: 1px solid transparent; border-radius: 8px 8px 0 0; color: var(--text-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.05em; transition: all 0.15s; }
    .tab-btn:hover { color: var(--text); background: var(--surface); }
    .tab-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-muted); }

    /* Toolbar */
    .toolbar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 200px; max-width: 360px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      padding: 0.5rem 0.85rem; outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }
    .filter-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.35rem 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-muted); }
    .filter-btn.active-high { border-color: var(--error); color: var(--error); background: var(--error-muted); }
    .filter-btn.active-medium { border-color: var(--warning); color: var(--warning); background: var(--warning-muted); }
    .filter-btn.active-low { border-color: var(--success); color: var(--success); background: var(--success-muted); }
    .result-count { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--surface-alt); color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.82rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.lead-row:hover td { background: var(--surface-hover); cursor: pointer; }
    tr.detail-row td { background: var(--surface-alt) !important; padding: 1rem 1.25rem; }
    .score-bar { display: flex; align-items: center; gap: 0.5rem; }
    .score-track { width: 52px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; background: var(--accent); border-radius: 2px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap; }
    .badge-high { background: var(--error-muted); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .badge-medium { background: var(--warning-muted); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-low { background: var(--success-muted); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-hot { background: var(--error-muted); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .badge-warm { background: var(--warning-muted); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-cold { background: rgba(100,100,100,0.15); color: #888; border: 1px solid #333; }
    .badge-signal { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
    .badge-source { background: rgba(255,107,53,0.08); color: var(--accent); border: 1px solid rgba(255,107,53,0.2); }
    .badge-ee-low { background: var(--success-muted); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-ee-medium { background: var(--warning-muted); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-ee-high { background: var(--error-muted); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .badge-warm-intro { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }

    /* Detail expand */
    .chevron { color: var(--text-muted); margin-right: 6px; font-size: 0.65rem; transition: transform 0.15s; display: inline-block; }
    .chevron.open { transform: rotate(90deg); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .detail-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .detail-url { color: var(--accent); font-size: 0.75rem; word-break: break-all; text-decoration: none; display: block; margin-top: 0.25rem; }
    .detail-url:hover { text-decoration: underline; }

    /* Companies grid */
    .companies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: border-color 0.15s; }
    .card.glow-hot { border-color: rgba(239,68,68,0.4); box-shadow: 0 0 20px rgba(239,68,68,0.08); }
    .card.glow-warm { border-color: rgba(245,158,11,0.4); box-shadow: 0 0 20px rgba(245,158,11,0.08); }
    .card.glow-accent { border-color: rgba(255,107,53,0.4); box-shadow: 0 0 20px rgba(255,107,53,0.08); }
    .company-name { font-family: 'Instrument Serif', serif; font-size: 1.1rem; line-height: 1.3; }
    .company-snippet { font-size: 0.78rem; color: var(--text-sec); font-style: italic; margin-top: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.03); border-left: 2px solid var(--accent); border-radius: 0 4px 4px 0; }

    /* Drafts */
    .drafts-grid { display: grid; gap: 1rem; }
    .draft-subject { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
    .draft-body { font-size: 0.82rem; color: var(--text-sec); line-height: 1.7; white-space: pre-wrap; }
    .draft-cta { font-size: 0.78rem; color: var(--accent); font-style: italic; margin-top: 0.5rem; }
    .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 0.25rem 0.75rem; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; transition: all 0.15s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }
    .section-title { font-family: 'Instrument Serif', serif; font-size: 1.5rem; margin-bottom: 0.75rem; }
    .section-title span { background: linear-gradient(135deg, var(--accent), #FF9A6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Loading / empty */
    .loading { display: flex; justify-content: center; padding: 3rem; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
    .empty strong { display: block; font-size: 1rem; color: var(--text-sec); margin-bottom: 0.5rem; }

    /* Buttons */
    .refresh-btn { background: var(--accent-muted); border: 1px solid var(--accent); color: var(--accent); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.05em; transition: background 0.15s; }
    .refresh-btn:hover { background: var(--accent); color: #fff; }

    /* Duplicates */
    .dupe-card { background: var(--surface); border: 1px solid rgba(245,158,11,0.3); border-radius: 10px; padding: 1rem; }
    .dupe-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .dupe-row:last-child { border-bottom: none; }
    .dupe-score { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; min-width: 3rem; text-align: right; }
    .dupe-score.high { color: var(--error); }
    .dupe-score.med  { color: var(--warning); }
    .dupe-score.low  { color: var(--text-muted); }
    .confidence-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; width: 60px; }
    .confidence-fill { height: 100%; border-radius: 2px; }
    .dupe-action { margin-left: auto; display: flex; gap: 0.4rem; }
    .btn-merge  { background: var(--success-muted); border: 1px solid rgba(16,185,129,0.3); color: var(--success); padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; }
    .btn-delete { background: var(--error-muted);   border: 1px solid rgba(239,68,68,0.3);   color: var(--error);   padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; }
    .btn-dismiss { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; }

    /* Run pipeline panel */
    .filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .filter-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .filter-btns .filter-btn { margin: 2px; }
    .run-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); cursor: pointer; padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.04em; text-align: left; transition: all 0.15s; line-height: 1.6;
    }
    .run-btn span { font-weight: 400; color: var(--text-muted); font-size: 0.65rem; display: block; }
    .run-btn:hover { border-color: var(--accent); color: var(--accent); }
    .run-btn:hover span { color: var(--accent-hover); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .run-btn-all { background: var(--accent-muted); border-color: var(--accent); color: var(--accent); text-align: center; font-size: 0.85rem; }
    .run-btn-all span { display: none; }
    .run-btn-all:hover { background: var(--accent); color: #fff; }
    .run-btn-all:disabled { background: var(--accent-muted); color: var(--accent); opacity: 0.5; }

    #run-log .log-line-ok    { color: var(--success); }
    #run-log .log-line-err   { color: var(--error); }
    #run-log .log-line-info  { color: var(--accent); }
    #run-log .log-line-skip  { color: var(--text-muted); }

    @media (max-width: 640px) {
      .app { padding: 1rem; }
      .detail-grid { grid-template-columns: 1fr; }
      #panel-run > div { grid-template-columns: 1fr !important; }
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header-row">
    <div class="header">
      <h1>Lead Agent</h1>
      <p>SEVEN INTELLIGENCE — OUTREACH PIPELINE</p>
      <div class="divider"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
      <button class="refresh-btn" onclick="loadAll()">↻ REFRESH</button>
      <span id="last-run" class="last-run"></span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-leads" onclick="switchTab('leads', this)">📋 ALL LEADS</button>
    <button class="tab-btn" id="tab-companies" onclick="switchTab('companies', this)">🔥 COMPANIES</button>
    <button class="tab-btn" id="tab-drafts" onclick="switchTab('drafts', this)">✉️ DRAFTS</button>
    <button class="tab-btn" id="tab-targets" onclick="switchTab('targets', this)">👤 TARGETS</button>
    <button class="tab-btn" id="tab-run" onclick="switchTab('run', this); initRunTab()">⚙️ RUN PIPELINE</button>
  </div>

  <!-- LEADS PANEL -->
  <div id="panel-leads" class="panel active">

    <!-- Duplicates alert bar -->
    <div id="dupes-bar" style="display:none;margin-bottom:1rem;background:var(--warning-muted);border:1px solid rgba(245,158,11,0.35);border-radius:10px;padding:0.75rem 1rem;cursor:pointer" onclick="toggleDupesPanel()">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span style="color:var(--warning);font-size:1rem">⚠️</span>
        <span id="dupes-bar-text" style="font-size:0.82rem;color:var(--warning)"></span>
        <span id="dupes-chevron" style="margin-left:auto;color:var(--warning);font-size:0.7rem">▶ expand</span>
      </div>
    </div>

    <!-- Duplicates panel (collapsible) -->
    <div id="dupes-panel" style="display:none;margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
        <div class="section-title" style="font-size:1.1rem">⚠️ <span>Potential Duplicates</span></div>
        <button class="copy-btn" onclick="loadDuplicates()">↻ Rescan</button>
      </div>
      <div id="dupes-grid" style="display:grid;gap:0.75rem"></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input id="leads-search" class="search-input" type="text" placeholder="Search company or title…" oninput="renderLeads()" />
      <div class="filter-btns">
        <button class="filter-btn active" id="f-all" onclick="setPriorityFilter('ALL', this)">ALL</button>
        <button class="filter-btn" id="f-high" onclick="setPriorityFilter('HIGH', this)">🔴 HIGH</button>
        <button class="filter-btn" id="f-medium" onclick="setPriorityFilter('MEDIUM', this)">🟡 MEDIUM</button>
        <button class="filter-btn" id="f-low" onclick="setPriorityFilter('LOW', this)">🟢 LOW</button>
      </div>
      <div class="filter-btns" id="source-filters"></div>
      <span class="result-count" id="leads-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Title</th>
            <th>Score</th>
            <th>Priority</th>
            <th>Source</th>
            <th>Location</th>
            <th>Job</th>
          </tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- COMPANIES PANEL -->
  <div id="panel-companies" class="panel">
    <div class="section-title">🔥 <span>HOT &amp; WARM COMPANIES</span></div>
    <div class="divider"></div>
    <div class="companies-grid" id="companies-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- DRAFTS PANEL -->
  <div id="panel-drafts" class="panel">
    <div class="section-title">✉️ <span>OUTREACH DRAFTS</span></div>
    <div class="divider"></div>
    <div class="drafts-grid" id="drafts-grid"></div>
  </div>

  <!-- RUN PIPELINE PANEL -->
  <div id="panel-run" class="panel">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start">

      <!-- Left: Filters -->
      <div>
        <div class="section-title" style="margin-bottom:1rem">⚙️ <span>Pipeline Filters</span></div>
        <div style="display:grid;gap:0.85rem">

          <div class="filter-group">
            <label class="filter-label">Priority</label>
            <div class="filter-btns">
              <button class="filter-btn active-high" id="rp-high"   onclick="setRunFilter('priority','HIGH',this)">🔴 HIGH</button>
              <button class="filter-btn active-medium" id="rp-med"  onclick="setRunFilter('priority','MEDIUM',this)">🟡 MEDIUM</button>
              <button class="filter-btn" id="rp-all-p"             onclick="setRunFilter('priority','ALL',this)">ALL</button>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Min Score</label>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <input type="range" id="rp-score" min="0" max="100" value="70" oninput="document.getElementById('rp-score-val').textContent=this.value" style="flex:1;accent-color:var(--accent)"/>
              <span id="rp-score-val" class="mono" style="font-size:0.8rem;color:var(--accent);min-width:2rem">70</span>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Source</label>
            <div class="filter-btns" id="rp-sources">
              <button class="filter-btn active" onclick="setRunFilter('source','ALL',this)">ALL</button>
              <button class="filter-btn" onclick="setRunFilter('source','TheHub',this)">TheHub</button>
              <button class="filter-btn" onclick="setRunFilter('source','LinkedIn',this)">LinkedIn</button>
              <button class="filter-btn" onclick="setRunFilter('source','IT-Jobbank',this)">IT-Jobbank</button>
              <button class="filter-btn" onclick="setRunFilter('source','Jobindex',this)">Jobindex</button>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">EE Risk Tolerance</label>
            <div class="filter-btns">
              <button class="filter-btn active-high" onclick="setRunFilter('eeRisk','LOW',this)">LOW only</button>
              <button class="filter-btn active-medium" onclick="setRunFilter('eeRisk','LOW,MEDIUM',this)">LOW + MEDIUM</button>
              <button class="filter-btn" onclick="setRunFilter('eeRisk','ALL',this)">ALL</button>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Temperature (Phase 3)</label>
            <div class="filter-btns">
              <button class="filter-btn active-high" onclick="setRunFilter('temperature','HOT',this)">🔥 HOT only</button>
              <button class="filter-btn active-medium" onclick="setRunFilter('temperature','HOT,WARM',this)">HOT + WARM</button>
              <button class="filter-btn" onclick="setRunFilter('temperature','ALL',this)">ALL</button>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Batch Limit <span class="mono" style="color:var(--text-muted)">(max companies)</span></label>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <input type="range" id="rp-limit" min="5" max="200" value="50" step="5" oninput="document.getElementById('rp-limit-val').textContent=this.value" style="flex:1;accent-color:var(--accent)"/>
              <span id="rp-limit-val" class="mono" style="font-size:0.8rem;color:var(--accent);min-width:2.5rem">50</span>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Cache</label>
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
              <input type="checkbox" id="rp-force" style="accent-color:var(--accent)" />
              <span style="font-size:0.82rem;color:var(--text-sec)">Force refresh (bypass 7-day cache)</span>
            </label>
          </div>
        </div>

        <!-- Run buttons -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:1.5rem">
          <button class="run-btn" onclick="triggerPhase(1)">▶ Phase 1<br><span>Scrape jobs</span></button>
          <button class="run-btn" onclick="triggerPhase(2)">▶ Phase 2<br><span>Enrich companies</span></button>
          <button class="run-btn" onclick="triggerPhase('2b')">▶ Phase 2B<br><span>Map people</span></button>
          <button class="run-btn" onclick="triggerPhase(3)">▶ Phase 3<br><span>Generate drafts</span></button>
          <button class="run-btn run-btn-all" style="grid-column:1/-1" onclick="triggerPhase('all')">🚀 RUN FULL PIPELINE</button>
        </div>
      </div>

      <!-- Right: Status + Log -->
      <div>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
          <div class="section-title" style="margin:0">📡 <span>Live Log</span></div>
          <div id="run-status-badge" class="badge badge-cold">IDLE</div>
          <button class="copy-btn" onclick="clearLog()" style="margin-left:auto">CLEAR</button>
        </div>
        <div id="run-log" style="
          background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;
          padding:0.85rem;height:420px;overflow-y:auto;
          font-family:'JetBrains Mono',monospace;font-size:0.7rem;line-height:1.7;
          color:var(--text-sec);
        ">
          <div style="color:var(--text-muted)">— waiting for run —</div>
        </div>
        <div id="run-elapsed" class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-top:0.4rem;text-align:right"></div>
      </div>

    </div>
  </div>

  <!-- TARGETS PANEL -->
  <div id="panel-targets" class="panel">
    <div class="section-title">👤 <span>KEY TARGETS</span></div>
    <div class="divider"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Person</th><th>Company</th><th>Role</th>
            <th>Strategy</th><th>Connection</th><th>LinkedIn</th>
          </tr>
        </thead>
        <tbody id="targets-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let _leads = [];
  let _priorityFilter = 'ALL';
  let _sourceFilter = 'ALL';
  let _draftTexts = {};

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function badge(text, cls) {
    return '<span class="badge ' + cls + '">' + esc(text) + '</span>';
  }

  function tempBadge(t) {
    if (!t) return badge('—', 'badge-cold');
    const map = { HOT: ['badge-hot', '🔥'], WARM: ['badge-warm', '☀️'], COLD: ['badge-cold', '🧊'] };
    const [cls, icon] = map[t] || ['badge-cold', ''];
    return badge(icon + ' ' + t, cls);
  }

  function eeBadge(r) {
    if (!r) return '';
    const cls = r === 'LOW' ? 'badge-ee-low' : r === 'MEDIUM' ? 'badge-ee-medium' : 'badge-ee-high';
    return badge('EE:' + r, cls);
  }

  function stratBadge(s) {
    if (!s) return badge('COLD', 'badge-cold');
    if (s.includes('WARM_INTRO')) return badge('🤝 WARM INTRO', 'badge-warm-intro');
    if (s.includes('WARM_REF'))   return badge('↗ WARM REF',   'badge-warm-intro');
    return badge('COLD OUT', 'badge-cold');
  }

  async function api(path) {
    const r = await fetch(path);
    return r.json();
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  async function loadStats() {
    const s = await api('/api/stats');
    if (s.error) {
      document.getElementById('stats-grid').innerHTML =
        '<div class="empty"><strong>' + esc(s.error) + '</strong></div>';
      return;
    }
    document.getElementById('last-run').textContent =
      s.lastRun ? 'Last run: ' + new Date(s.lastRun).toLocaleString('da-DK') : 'No runs yet';
    document.getElementById('stats-grid').innerHTML =
      '<div class="stat-card accent"><div class="stat-value">' + s.totalLeads + '</div><div class="stat-label">Total Leads</div></div>' +
      '<div class="stat-card accent"><div class="stat-value">' + s.highLeads + '</div><div class="stat-label">HIGH Priority</div></div>' +
      '<div class="stat-card hot"><div class="stat-value">' + s.hotCompanies + '</div><div class="stat-label">HOT Companies</div></div>' +
      '<div class="stat-card warning"><div class="stat-value">' + s.warmCompanies + '</div><div class="stat-label">WARM Companies</div></div>' +
      '<div class="stat-card success"><div class="stat-value">' + s.totalDrafts + '</div><div class="stat-label">Drafts Ready</div></div>' +
      '<div class="stat-card purple"><div class="stat-value">' + s.warmIntros + '</div><div class="stat-label">Warm Intros</div></div>';
  }

  // ── Priority filter ───────────────────────────────────────────────────────
  function setPriorityFilter(val, btn) {
    _priorityFilter = val;
    document.querySelectorAll('#panel-leads .filter-btns:first-of-type .filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    const activeClass = val === 'HIGH' ? 'filter-btn active-high' : val === 'MEDIUM' ? 'filter-btn active-medium' : val === 'LOW' ? 'filter-btn active-low' : 'filter-btn active';
    btn.className = activeClass;
    renderLeads();
  }

  function setSourceFilter(val, btn) {
    _sourceFilter = val;
    document.querySelectorAll('#source-filters .filter-btn').forEach(b => b.className = 'filter-btn');
    btn.className = 'filter-btn active';
    renderLeads();
  }

  // ── Leads ─────────────────────────────────────────────────────────────────
  async function loadLeads() {
    _leads = await api('/api/leads');
    // Build source filters
    const sources = ['ALL', ...new Set(_leads.map(l => l.source).filter(Boolean))];
    document.getElementById('source-filters').innerHTML = sources.map(s =>
      '<button class="filter-btn' + (s === 'ALL' ? ' active' : '') + '" onclick="setSourceFilter(\'' + esc(s) + '\', this)">' + esc(s) + '</button>'
    ).join('');
    renderLeads();
  }

  function renderLeads() {
    const query = (document.getElementById('leads-search').value || '').toLowerCase();
    const tbody = document.getElementById('leads-tbody');

    let filtered = _leads.filter(l => {
      if (_priorityFilter !== 'ALL' && l.priority !== _priorityFilter) return false;
      if (_sourceFilter !== 'ALL' && l.source !== _sourceFilter) return false;
      if (query) {
        const haystack = ((l.company || '') + ' ' + (l.title || '') + ' ' + (l.location || '') + ' ' + (l.scoring_factors || '')).toLowerCase();
        if (!haystack.includes(query)) return false;
      }
      return true;
    });

    document.getElementById('leads-count').textContent = filtered.length + ' / ' + _leads.length + ' leads';

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty"><strong>No matches</strong>Try a different filter or search term</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(function(l, i) {
      const pBadge = l.priority === 'HIGH' ? 'badge-high' : l.priority === 'MEDIUM' ? 'badge-medium' : 'badge-low';
      const fillW = Math.round(l.priority_score || 0) + '%';
      const factors = (l.scoring_factors || '').split(',').map(f => f.trim()).filter(Boolean);
      const factorHtml = factors.length
        ? factors.map(f => '<span class="badge badge-signal" style="margin:2px">' + esc(f) + '</span>').join('')
        : '<span style="color:var(--text-muted);font-size:0.75rem">—</span>';
      const scraped = l.scraped_at ? new Date(l.scraped_at).toLocaleDateString('da-DK') : '—';
      const detailId = 'detail-' + l.id;
      const chevronId = 'chev-' + l.id;

      const detailHtml =
        '<tr id="' + detailId + '" class="detail-row" style="display:none">' +
          '<td colspan="7">' +
            '<div class="detail-grid">' +
              '<div>' +
                '<div class="detail-label">Scoring Signals</div>' +
                '<div style="display:flex;flex-wrap:wrap;gap:4px">' + factorHtml + '</div>' +
              '</div>' +
              '<div>' +
                '<div class="detail-label">Details</div>' +
                '<div style="font-size:0.78rem;color:var(--text-sec);line-height:2">' +
                  '<span style="color:var(--text-muted)">Source:</span> ' + esc(l.source) + '&nbsp;&nbsp;' +
                  '<span style="color:var(--text-muted)">Scraped:</span> ' + scraped +
                  (l.canonical_url ? '<a class="detail-url" href="' + esc(l.canonical_url) + '" target="_blank">' + esc(l.canonical_url) + '</a>' : '') +
                '</div>' +
              '</div>' +
            '</div>' +
          '</td>' +
        '</tr>';

      const rowHtml =
        '<tr class="lead-row" onclick="toggleDetail(\'' + detailId + '\',\'' + chevronId + '\')">' +
          '<td><span class="chevron" id="' + chevronId + '">&#9654;</span><strong>' + esc(l.company) + '</strong></td>' +
          '<td style="color:var(--text-sec)">' + esc(l.title) + '</td>' +
          '<td><div class="score-bar"><div class="score-track"><div class="score-fill" style="width:' + fillW + '"></div></div><span class="mono" style="font-size:0.7rem;color:var(--text-muted)">' + (l.priority_score || 0) + '</span></div></td>' +
          '<td>' + badge(l.priority || '—', pBadge) + '</td>' +
          '<td>' + badge(l.source || '—', 'badge-source') + '</td>' +
          '<td style="color:var(--text-muted);font-size:0.75rem">' + esc(l.location) + '</td>' +
          '<td>' + (l.canonical_url ? '<a href="' + esc(l.canonical_url) + '" target="_blank" onclick="event.stopPropagation()" class="mono" style="color:var(--accent);font-size:0.7rem;text-decoration:none">&#x2197; open</a>' : '—') + '</td>' +
        '</tr>';

      return rowHtml + detailHtml;
    }).join('');
  }

  function toggleDetail(detailId, chevronId) {
    const row = document.getElementById(detailId);
    const chev = document.getElementById(chevronId);
    if (!row) return;
    const opening = row.style.display === 'none' || !row.style.display;
    row.style.display = opening ? 'table-row' : 'none';
    if (chev) chev.classList.toggle('open', opening);
  }

  // ── Companies ─────────────────────────────────────────────────────────────
  async function loadCompanies() {
    const companies = await api('/api/companies');
    const grid = document.getElementById('companies-grid');
    if (!companies.length) {
      grid.innerHTML = '<div class="empty"><strong>No companies enriched yet</strong>Run Phase 2 to enrich companies</div>';
      return;
    }
    grid.innerHTML = companies.map(function(c) {
      const glowClass = c.hiring_temperature === 'HOT' ? 'glow-hot' : c.hiring_temperature === 'WARM' ? 'glow-warm' : '';
      let signals = []; try { signals = JSON.parse(c.hiring_signals || '[]'); } catch(e) {}
      let snippets = []; try { snippets = JSON.parse(c.hiring_signal_snippets || '[]'); } catch(e) {}
      let angles = [];   try { angles   = JSON.parse(c.outreach_angles || '[]'); } catch(e) {}
      const ceo = c.ceo_name ? '<span style="color:var(--text-muted)">CEO:</span> ' + esc(c.ceo_name) : '';
      const cto = c.cto_name ? '<span style="color:var(--text-muted)">CTO:</span> ' + esc(c.cto_name) : '';
      return '<div class="card ' + glowClass + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem">' +
          '<div>' +
            '<div class="company-name">' + esc(c.company_name) + '</div>' +
            '<div class="mono" style="font-size:0.65rem;color:var(--text-muted)">' + (c.employees_count || '') + ' ' + (c.company_size || '') + '</div>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem">' + tempBadge(c.hiring_temperature) + eeBadge(c.ee_risk) + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0.5rem">' + signals.map(s => badge('📡 ' + s, 'badge-warm')).join('') + '</div>' +
        (snippets[0] ? '<div class="company-snippet">"' + esc(snippets[0]) + '"</div>' : '') +
        (angles[0]   ? '<div style="font-size:0.78rem;color:var(--accent);margin-top:0.5rem">→ ' + esc(angles[0]) + '</div>' : '') +
        ((ceo || cto) ? '<div class="mono" style="font-size:0.72rem;color:var(--text-sec);margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)">' + [ceo, cto].filter(Boolean).join(' &nbsp;·&nbsp; ') + '</div>' : '') +
        (c.linkedin_url ? '<div style="margin-top:0.5rem"><a href="' + esc(c.linkedin_url) + '" target="_blank" class="mono" style="font-size:0.65rem;color:var(--accent);text-decoration:none">↗ LinkedIn</a></div>' : '') +
      '</div>';
    }).join('');
  }

  // ── Drafts ────────────────────────────────────────────────────────────────
  async function loadDrafts() {
    const drafts = await api('/api/drafts');
    const grid = document.getElementById('drafts-grid');
    if (!drafts.length) {
      grid.innerHTML = '<div class="empty"><strong>No drafts yet</strong>Run Phase 3 to generate outreach drafts</div>';
      return;
    }
    _draftTexts = {};
    grid.innerHTML = drafts.map(function(d, i) {
      _draftTexts[i] = (d.subject || '') + '\n\n' + (d.body || '') + '\n\n' + (d.cta || '');
      return '<div class="card glow-accent">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">' +
          '<div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">' +
            '<strong class="serif">' + esc(d.company_name) + '</strong>' +
            (d.target_name ? '<span class="mono" style="font-size:0.7rem;color:var(--text-muted)">→ ' + esc(d.target_name) + '</span>' : '') +
            tempBadge(d.hiring_temperature) +
          '</div>' +
          '<button class="copy-btn" id="copy-' + i + '" onclick="copyDraft(' + i + ')">COPY</button>' +
        '</div>' +
        (d.angle_used ? '<div class="mono" style="font-size:0.65rem;color:var(--accent);margin-bottom:0.75rem">Angle: ' + esc(d.angle_used) + '</div>' : '') +
        '<div class="draft-subject">&#x2709;&#xFE0F; ' + esc(d.subject) + '</div>' +
        '<div class="draft-body">' + esc(d.body) + '</div>' +
        '<div class="draft-cta">→ ' + esc(d.cta) + '</div>' +
      '</div>';
    }).join('');
  }

  function copyDraft(i) {
    navigator.clipboard.writeText(_draftTexts[i] || '').then(function() {
      const btn = document.getElementById('copy-' + i);
      btn.textContent = 'COPIED ✓';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Targets ───────────────────────────────────────────────────────────────
  async function loadTargets() {
    const targets = await api('/api/targets');
    const tbody = document.getElementById('targets-tbody');
    if (!targets.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty"><strong>No targets yet</strong>Run Phase 2B</td></tr>';
      return;
    }
    tbody.innerHTML = targets.map(function(t) {
      return '<tr>' +
        '<td><strong>' + esc(t.target_name || '—') + '</strong></td>' +
        '<td style="color:var(--text-sec)">' + esc(t.company_name) + '</td>' +
        '<td>' + badge(t.target_role || '—', 'badge-cold') + '</td>' +
        '<td>' + stratBadge(t.outreach_strategy) + '</td>' +
        '<td>' + (t.connection_found ? '<span style="color:var(--success)">✓ ' + esc(t.connection_type) + '</span>' : '<span style="color:var(--text-muted)">—</span>') + '</td>' +
        '<td>' + (t.target_linkedin_url ? '<a href="' + esc(t.target_linkedin_url) + '" target="_blank" class="mono" style="color:var(--accent);font-size:0.75rem;text-decoration:none">↗ Profile</a>' : '—') + '</td>' +
      '</tr>';
    }).join('');
  }

  // ── Load all ──────────────────────────────────────────────────────────────
  async function loadAll() {
    await Promise.all([loadStats(), loadLeads(), loadCompanies(), loadDrafts(), loadTargets(), loadDuplicates()]);
  }

  loadAll();
  setInterval(loadAll, 30000);

  // ── Duplicate detection ────────────────────────────────────────────────────

  let _dupesData = [];
  let _dismissedDupes = new Set();

  async function loadDuplicates() {
    const groups = await api('/api/duplicates');
    _dupesData = groups;
    renderDuplicates();
  }

  function renderDuplicates() {
    const active = _dupesData.filter((g, i) => !_dismissedDupes.has(i));
    const bar = document.getElementById('dupes-bar');
    const barText = document.getElementById('dupes-bar-text');
    const grid = document.getElementById('dupes-grid');

    if (!active.length) {
      if (bar) bar.style.display = 'none';
      if (grid) grid.innerHTML = '<div class="empty"><strong>No duplicates found</strong>All company names look unique</div>';
      return;
    }

    if (bar) { bar.style.display = 'block'; }
    if (barText) barText.textContent = active.length + ' potential duplicate group' + (active.length > 1 ? 's' : '') + ' found — click to review';

    if (!grid) return;
    grid.innerHTML = active.map(function(g, gi) {
      const conf = Math.round(g.confidence * 100);
      const confColor = conf >= 90 ? '#EF4444' : conf >= 75 ? '#F59E0B' : '#6B7280';
      const canonical = esc(g.suggestedCanonical);

      const rows = g.leads.map(function(l, li) {
        const isSuggested = l.company === g.suggestedCanonical;
        const matchPct = l.matchScore ? Math.round(l.matchScore * 100) + '%' : '100%';
        const scoreClass = (l.matchScore || 1) >= 0.9 ? 'high' : (l.matchScore || 1) >= 0.75 ? 'med' : 'low';
        return '<div class="dupe-row">' +
          (isSuggested ? '<span style="color:var(--success);font-size:0.7rem" title="Suggested canonical">★</span>' : '<span style="width:0.7rem;display:inline-block"></span>') +
          '<span style="font-size:0.82rem;flex:1">' + esc(l.company) + '</span>' +
          '<span class="mono" style="font-size:0.7rem;color:var(--text-muted)">' + l.count + ' lead' + (l.count > 1 ? 's' : '') + '</span>' +
          '<div class="confidence-bar"><div class="confidence-fill" style="width:' + matchPct + ';background:' + confColor + '"></div></div>' +
          '<span class="dupe-score ' + scoreClass + '">' + matchPct + '</span>' +
          '<div class="dupe-action">' +
            (!isSuggested ? '<button class="btn-merge" onclick="mergeDupe(' + gi + ',\'' + esc(l.company).replace(/'/g, "\\'") + '\',\'' + canonical.replace(/'/g, "\\'") + '\')">→ Merge</button>' : '<span class="mono" style="font-size:0.65rem;color:var(--success);padding:0.2rem 0.6rem">KEEP</span>') +
            (!isSuggested ? '<button class="btn-delete" onclick="deleteCompany(\'' + esc(l.company).replace(/'/g, "\\'") + '\',' + gi + ')">Delete</button>' : '') +
          '</div>' +
        '</div>';
      }).join('');

      const reason = (g.reason || '').replace(/_/g, ' ');
      return '<div class="dupe-card">' +
        '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem">' +
          '<span class="badge" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:' + confColor + '">' + conf + '% match</span>' +
          '<span class="mono" style="font-size:0.65rem;color:var(--text-muted)">' + esc(reason) + '</span>' +
          '<span class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-left:auto">Canonical: <strong style="color:var(--text)">' + canonical + '</strong></span>' +
          '<button class="btn-dismiss" onclick="dismissDupe(' + gi + ')">✕ dismiss</button>' +
        '</div>' +
        rows +
      '</div>';
    }).join('');
  }

  function toggleDupesPanel() {
    const panel = document.getElementById('dupes-panel');
    const chev  = document.getElementById('dupes-chevron');
    if (!panel) return;
    const open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (chev) chev.textContent = open ? '▼ collapse' : '▶ expand';
  }

  function dismissDupe(gi) {
    _dismissedDupes.add(gi);
    renderDuplicates();
  }

  async function mergeDupe(gi, fromName, toName) {
    if (!confirm('Merge "' + fromName + '" into "' + toName + '"?\nAll leads will be renamed and deduped.')) return;
    try {
      const r = await fetch('/api/leads/merge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: fromName, to: toName }),
      });
      const d = await r.json();
      if (d.ok) {
        _dismissedDupes.add(gi);
        await loadLeads();
        await loadDuplicates();
      } else {
        alert('Merge failed: ' + (d.error || 'unknown error'));
      }
    } catch (err) { alert('Error: ' + err.message); }
  }

  async function deleteCompany(name, gi) {
    if (!confirm('Delete ALL leads for "' + name + '"?\nThis cannot be undone.')) return;
    try {
      const r = await fetch('/api/leads/company?name=' + encodeURIComponent(name), { method: 'DELETE' });
      const d = await r.json();
      if (d.ok) {
        _dismissedDupes.add(gi);
        await loadLeads();
        await loadDuplicates();
      } else {
        alert('Delete failed: ' + (d.error || 'unknown error'));
      }
    } catch (err) { alert('Error: ' + err.message); }
  }

  // ── Run pipeline ───────────────────────────────────────────────────────────

  let _runFilters = {
    priority: 'HIGH',
    source: 'ALL',
    eeRisk: 'LOW',
    temperature: 'HOT,WARM',
  };
  let _runEvtSource = null;
  let _runStartedAt = null;
  let _elapsedTimer = null;

  function initRunTab() {
    connectRunLog();
    pollRunStatus();
  }

  function setRunFilter(key, val, btn) {
    _runFilters[key] = val;
    // Deactivate siblings in same group
    if (btn && btn.parentElement) {
      btn.parentElement.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active', 'active-high', 'active-medium', 'active-low');
      });
      // Re-apply appropriate active class
      const activeClass = val === 'HIGH' || val === 'LOW' || val === 'HOT' ? 'active-high'
        : val === 'MEDIUM' || val === 'LOW,MEDIUM' || val === 'HOT,WARM' ? 'active-medium'
        : 'active';
      btn.classList.add(activeClass);
    }
  }

  function getRunFilters() {
    return {
      priority:     _runFilters.priority || 'HIGH',
      source:       _runFilters.source   || 'ALL',
      eeRisk:       _runFilters.eeRisk   || 'LOW,MEDIUM',
      temperature:  _runFilters.temperature || 'HOT,WARM',
      minScore:     parseInt(document.getElementById('rp-score')?.value || '70', 10),
      limit:        parseInt(document.getElementById('rp-limit')?.value || '50', 10),
      forceRefresh: document.getElementById('rp-force')?.checked || false,
    };
  }

  async function triggerPhase(phase) {
    const endpoint = phase === 'all' ? '/api/run/all'
      : phase === '2b' ? '/api/run/phase2b'
      : '/api/run/phase' + phase;

    const filters = getRunFilters();
    setRunButtonsDisabled(true);

    try {
      const r = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(filters),
      });
      const data = await r.json();
      if (!r.ok || data.error) {
        appendLog('❌ ' + (data.error || 'Failed to start'), 'err');
        setRunButtonsDisabled(false);
        return;
      }
      appendLog('▶ Started: ' + data.message, 'info');
      _runStartedAt = Date.now();
      startElapsedTimer();
      connectRunLog();
    } catch (err) {
      appendLog('❌ Network error: ' + err.message, 'err');
      setRunButtonsDisabled(false);
    }
  }

  function connectRunLog() {
    if (_runEvtSource) { _runEvtSource.close(); _runEvtSource = null; }
    const es = new EventSource('/api/run/log');
    _runEvtSource = es;
    es.onmessage = function(e) {
      try {
        const line = JSON.parse(e.data);
        appendLog(line);
      } catch {}
    };
    es.onerror = function() {
      // Reconnect handled by browser
    };
  }

  function appendLog(line, forceCls) {
    const log = document.getElementById('run-log');
    if (!log) return;
    // Clear placeholder
    if (log.querySelector('div[style]')) {
      const placeholder = log.querySelector('div[style*="text-muted"]');
      if (placeholder && placeholder.textContent.includes('waiting')) placeholder.remove();
    }
    const div = document.createElement('div');
    div.className = 'log-line-' + (forceCls || classifyLogLine(line));
    div.textContent = line;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function classifyLogLine(line) {
    if (!line) return 'info';
    if (line.includes('✅') || line.includes('✓')) return 'ok';
    if (line.includes('❌') || line.includes('✗') || line.includes('failed') || line.includes('error')) return 'err';
    if (line.includes('⏭') || line.includes('Skipping') || line.includes('cached')) return 'skip';
    return 'info';
  }

  function clearLog() {
    const log = document.getElementById('run-log');
    if (log) log.innerHTML = '<div style="color:var(--text-muted)">— cleared —</div>';
  }

  function setRunButtonsDisabled(disabled) {
    document.querySelectorAll('.run-btn').forEach(b => b.disabled = disabled);
  }

  function startElapsedTimer() {
    if (_elapsedTimer) clearInterval(_elapsedTimer);
    _elapsedTimer = setInterval(function() {
      const el = document.getElementById('run-elapsed');
      if (!el || !_runStartedAt) return;
      const secs = Math.floor((Date.now() - _runStartedAt) / 1000);
      const m = Math.floor(secs / 60), s = secs % 60;
      el.textContent = 'Elapsed: ' + m + 'm ' + s + 's';
    }, 1000);
  }

  async function pollRunStatus() {
    try {
      const r = await fetch('/api/run/status');
      const s = await r.json();
      updateRunStatusBadge(s.status, s.phase);
      if (s.status === 'running') {
        setRunButtonsDisabled(true);
        if (!_runStartedAt && s.startedAt) { _runStartedAt = new Date(s.startedAt).getTime(); startElapsedTimer(); }
        setTimeout(pollRunStatus, 2000);
      } else {
        setRunButtonsDisabled(false);
        if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null; }
        if (s.status === 'done' || s.status === 'error') {
          loadAll(); // Refresh data
        }
      }
    } catch {}
  }

  function updateRunStatusBadge(status, phase) {
    const badge = document.getElementById('run-status-badge');
    if (!badge) return;
    const map = {
      idle:    ['badge-cold',       'IDLE'],
      running: ['badge-warm',       'RUNNING — Phase ' + (phase || '?')],
      done:    ['badge-ee-low',     'DONE'],
      error:   ['badge-ee-high',    'ERROR'],
    };
    const [cls, label] = map[status] || ['badge-cold', status.toUpperCase()];
    badge.className = 'badge ' + cls;
    badge.textContent = label;
  }
</script>
</body>
</html>
